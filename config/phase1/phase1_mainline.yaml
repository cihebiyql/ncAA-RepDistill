run_id: phase1_mainline
description: >-
  Phase1 mainline: no morgan supervision, keep rdkit2d auxiliary supervision,
  consistency learning, dual-teacher distillation, and residual fusion distillation.
seed: 777

device:
  gpu_id: 0

data:
  paths:
    vocab_smiles: data/raw/adaptation/vocab_smiles.txt
    train_data: data/prepared/pretrain/train_sequences_with_rdkit2d.csv
    val_data: data/prepared/pretrain/val_sequences_with_rdkit2d.csv
  batch_size: 8
  num_workers: 12
  pin_memory: true
  augmentation:
    random_smiles:
      enabled: true
      mix_ratio: 0.3
      num_variants: 2
    smiles_mask:
      enabled: true
      mask_prob: 0.2
  consistency:
    enabled: true
    num_variants: 2
    max_cache_size: 50000
    max_tries_per_variant: 20

student:
  smiles_encoder:
    vocab_size: 37
    embed_dim: 768
    num_layers: 13
    num_heads: 12
    max_length: 768
    dropout: 0.12
  projection:
    esm2_dim: 1280
    chemberta_dim: 2048
  graph_attention:
    enabled: true
    max_distance: 8
    bias_mode: per_head
    cache_size: 50000
  contrastive_proj:
    enabled: false
    output_dim: 256
    hidden_dim: 768
    dropout: 0.1
  use_smiles_mlm: true

teacher:
  esm2:
    use_feature_cache: true
    feature_cache_path: data/teacher_cache/phase1/esm2
    hidden_dim: 1280
    id_keys:
      - sequence_ids
      - sequence_id
  chemberta:
    use_feature_cache: true
    feature_cache_path: data/teacher_cache/phase1/chemberta
    hidden_dim: 2048
    id_keys:
      - sequence_ids
      - sequence_id

fusion:
  enabled: true
  mode: residual_distill
  target: geminimol
  hs_source: molecular_proj
  proj_dim: 2048
  start_epoch: 10
  loss_weight: 0.2
  stop_grad_hs: true
  freeze_smiles: false

loss:
  weights:
    type: progressive
    stages:
      - epochs: [0, 10]
        weights:
          protein: 0.5
          molecular: 0.3
          self: 0.2
          rkd: 0.0
          contrastive: 0.01
          consistency: 0.02
          task: 0.0
          task_fp: 0.05
      - epochs: [10, 30]
        weights:
          protein: 0.5
          molecular: 0.3
          self: 0.2
          rkd: 0.0
          contrastive: 0.03
          consistency: 0.02
          task: 0.0
          task_fp: 0.03
      - epochs: [30, 45]
        weights:
          protein: 0.5
          molecular: 0.3
          self: 0.2
          rkd: 0.0
          contrastive: 0.03
          consistency: 0.02
          task: 0.0
          task_fp: 0.02
  rkd:
    enabled: false
  contrastive:
    enabled: true
    apply_to: [molecular]
    tau: 0.07
    symmetric: true
  consistency:
    enabled: true
    apply_to: smiles_repr
    method: cosine
    tau: 0.07
    symmetric: true
  task_supervision_aux:
    enabled: true
    label_source: rdkit2d_v1
    loss_type: mse
    feature_type: smiles_repr
    head_type: mlp1
    mlp_hidden_dim: 256
    dropout: 0.1
    tasks:
      - MolWt
      - MolLogP
      - TPSA
      - NumRotatableBonds
      - NumHDonors
      - NumHAcceptors
      - NumHeteroatoms
      - NumAromaticRings
      - NumSaturatedRings
      - NumAliphaticRings
      - BertzCT
      - Chi0
      - Chi1
      - Chi0n
      - Chi1n
      - Chi2n
      - Chi3n
      - Chi4n
      - HallKierAlpha
      - Kappa1
      - Kappa2
      - Kappa3
      - NumValenceElectrons
      - MaxPartialCharge
      - MinPartialCharge
      - NumAtoms
      - NumBonds
      - RingCount
      - FractionCSP3
      - MolMR
    task_weights:
      MolWt: 1.0
      MolLogP: 1.0
      TPSA: 1.0
      NumRotatableBonds: 1.0
      NumHDonors: 1.0
      NumHAcceptors: 1.0
      NumHeteroatoms: 1.0
      NumAromaticRings: 1.0
      NumSaturatedRings: 1.0
      NumAliphaticRings: 1.0
      BertzCT: 1.0
      Chi0: 1.0
      Chi1: 1.0
      Chi0n: 1.0
      Chi1n: 1.0
      Chi2n: 1.0
      Chi3n: 1.0
      Chi4n: 1.0
      HallKierAlpha: 1.0
      Kappa1: 1.0
      Kappa2: 1.0
      Kappa3: 1.0
      NumValenceElectrons: 1.0
      MaxPartialCharge: 1.0
      MinPartialCharge: 1.0
      NumAtoms: 1.0
      NumBonds: 1.0
      RingCount: 1.0
      FractionCSP3: 1.0
      MolMR: 1.0
    normalization:
      enabled: true
      type: zscore
  task_supervision:
    enabled: false

training:
  epochs: 30
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision:
    enabled: true
    use_grad_scaler: false
  gradient_checkpointing:
    enabled: false
  optimizer:
    type: adamw
    lr: 0.00013
    weight_decay: 0.012
    betas: [0.9, 0.999]
    scheduler:
      type: cosine
      warmup_steps: 4500
      min_lr: 0.000002
  ema:
    enabled: true
    decay: 0.999
    use_for_eval: true
  log_interval: 200
  val_interval_epochs: 5
  save_interval_epochs: 5
  output_dir: runs/phase1_mainline
  resume_from: null

evaluation:
  best_metric: val_loss
  best_metric_mode: min
  best_from_epoch: 11
