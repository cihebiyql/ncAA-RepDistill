phase3_head_training:
  script: scripts/train_phase3_heads.py
  feature_dir: features/phase3_best_downstream_molecular_proj
  output_dir: results/phase3_heads/best_downstream_mlp
  head_type: mlp
  hidden_dims: [1024, 512, 256]
  dropout: 0.15
  lr: 0.001
  alpha: 0.0001
  epochs: 300
  batch_size: 256
  patience: 30
  seeds: [42, 123, 202]
